spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/subscription_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username:
    password:

  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  type-aliases-package: com.gooodock.model.dto
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

logging:
  level:
    com.gooodock.model.mapper: DEBUG